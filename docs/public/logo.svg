<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 外框渐变：蓝色 -> 紫色 -> 粉红色 -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0080FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B9D;stop-opacity:1" />
    </linearGradient>

    <!-- 箭头渐变：蓝色 -> 紫色 -->
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#borderGradient)"/>

  <!-- 内部深色背景 -->
  <rect x="40" y="40" width="944" height="944" rx="180" fill="#1F2937"/>

  <!-- 箭头符号 (大于号形状) -->
  <path d="M 335 265 L 765 490 L 765 558 L 335 783 L 335 685 L 650 524 L 335 363 Z" fill="url(#arrowGradient)"/>
</svg>
